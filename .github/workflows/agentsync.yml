name: agentsync

on:
  pull_request:
    paths:
      - "agent/**"
      - "CLAUDE.md"
      - "AGENTS.md"
      - ".cursorrules"
      - ".cursor/rules/**"
      - ".clinerules"
      - ".windsurfrules"
      - ".github/copilot-instructions.md"
      - ".github/workflows/agentsync.yml"
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @agentsync/adapter-sdk run build

      - name: Build CLI
        run: pnpm run build

      - name: Verify sync is up-to-date
        run: node dist/cli/index.js sync --check

      - name: Verify scan artifacts are fresh
        run: node dist/cli/index.js scan --check

      - name: Lint memory files
        run: node dist/cli/index.js lint
